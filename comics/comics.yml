# Comic pool — webcomics used as interludes in the magazine.
#
# One comic runs before the magazine starts, then one after roughly every 14
# article cards (placed at the nearest chapter boundary). Comics are drawn in
# order and never repeat across editions (see state/comics_used.json).
#
# LICENSING — only add comics you are allowed to embed:
#   - xkcd (Randall Munroe): CC BY-NC 2.5 — embed with attribution + link back,
#     non-commercial only. If Kotlin Digest ever monetises, this breaks.
#   - Any all-rights-reserved comic (SMBC, CommitStrip, MonkeyUser, ...) needs
#     the artist's explicit permission before it goes here.
# Each entry must credit the artist and link to the original (permalink).
#
# Community PRs welcome — add an entry below (same shape).

